<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<title>OutSystems O11 問題集</title>
<style>
  :root{
    --bg:#f5f7fa; --card:#ffffff; --border:#e2e8f0; --text:#1e293b;
    --muted:#64748b; --accent:#2563eb; --accent-soft:#eff6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.6;
    padding:24px 16px 48px; max-width:720px; margin:0 auto;
  }
  header{margin-bottom:24px;}
  h1{font-size:1.4rem; margin:0 0 4px;}
  .sub{color:var(--muted); font-size:.9rem; margin:0;}
  h2{font-size:1rem; color:var(--muted); margin:28px 0 10px; font-weight:600;
     border-bottom:1px solid var(--border); padding-bottom:6px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;}
  a.card{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; text-decoration:none; color:var(--text);
    transition:background .12s,border-color .12s,transform .06s;
  }
  a.card:active{transform:scale(.99);}
  a.card:hover{background:var(--accent-soft); border-color:var(--accent);}
  .card .label{font-weight:600; font-size:1.05rem;}
  .card .arrow{color:var(--accent); font-size:1.2rem;}
  footer{margin-top:36px; color:var(--muted); font-size:.8rem; text-align:center;}
</style>
</head>
<body>
<header>
  <h1>📘 OutSystems O11 問題集</h1>
  <p class="sub">コース・セットを選んでください</p>
</header>

<section>
  <h2>コース1</h2>
  <div class="grid">
    <a class="card" href="course1-set1/"><span class="label">セット1</span><span class="arrow">→</span></a>
    <a class="card" href="course1-set2/"><span class="label">セット2</span><span class="arrow">→</span></a>
    <a class="card" href="course1-set3/"><span class="label">セット3</span><span class="arrow">→</span></a>
    <a class="card" href="course1-set4/"><span class="label">セット4</span><span class="arrow">→</span></a>
  </div>
</section>

<section>
  <h2>コース2</h2>
  <div class="grid">
    <a class="card" href="course2-set1/"><span class="label">セット1</span><span class="arrow">→</span></a>
    <a class="card" href="course2-set2/"><span class="label">セット2</span><span class="arrow">→</span></a>
    <a class="card" href="course2-set3/"><span class="label">セット3</span><span class="arrow">→</span></a>
  </div>
</section>

<section>
  <h2>コース3</h2>
  <div class="grid">
    <a class="card" href="course3-set1/"><span class="label">セット1</span><span class="arrow">→</span></a>
    <a class="card" href="course3-set2/"><span class="label">セット2</span><span class="arrow">→</span></a>
    <a class="card" href="course3-set3/"><span class="label">セット3</span><span class="arrow">→</span></a>
    <a class="card" href="course3-set4/"><span class="label">セット4</span><span class="arrow">→</span></a>
    <a class="card" href="course3-set5/"><span class="label">セット5</span><span class="arrow">→</span></a>
  </div>
</section>

<section>
  <h2>コース4</h2>
  <div class="grid">
    <a class="card" href="course4-set1/"><span class="label">セット1</span><span class="arrow">→</span></a>
    <a class="card" href="course4-set2/"><span class="label">セット2</span><span class="arrow">→</span></a>
    <a class="card" href="course4-set3/"><span class="label">セット3</span><span class="arrow">→</span></a>
    <a class="card" href="course4-set4/"><span class="label">セット4</span><span class="arrow">→</span></a>
    <a class="card" href="course4-set5/"><span class="label">セット5</span><span class="arrow">→</span></a>
  </div>
</section>

<footer>スマホでは「ホーム画面に追加」でアプリのように使えます</footer>
</body>
</html>
