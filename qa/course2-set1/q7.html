<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>コース2 / セット1 問7 ｜ OutSystems O11 問題集</title><style>
:root{--bg:#f4f6f9;--card:#fff;--ink:#1f2733;--sub:#5b6675;--line:#e3e8ef;--pri:#0a7d6b;--pri2:#e6f4f1;--acc:#c4453a;--ok:#0a7d6b;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;line-height:1.7}
.wrap{max-width:900px;margin:0 auto;padding:24px 18px 80px}
header.top{text-align:center;padding:26px 0 10px}
header.top h1{margin:0 0 4px;font-size:1.5rem}
header.top .sub{color:var(--sub);font-size:.92rem}
.toolbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0 6px}
.toolbar button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 14px;border-radius:999px;cursor:pointer;font-size:.9rem}
.toolbar button:hover{background:var(--pri2);border-color:var(--pri)}
.nav{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px 0 24px}
.nav a{width:32px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.78rem;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--sub);text-decoration:none}
.nav a:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.sec{font-size:1.05rem;color:var(--pri);border-left:4px solid var(--pri);padding:4px 12px;margin:26px 0 12px;background:var(--pri2);border-radius:0 8px 8px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:0 0 18px;box-shadow:0 1px 3px rgba(20,30,50,.05)}
.qhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.qnum{background:var(--pri);color:#fff;font-weight:700;padding:3px 12px;border-radius:8px;font-size:.95rem}
.multibadge{font-size:.76rem;color:#8a5a00;background:#fdf0d8;padding:2px 9px;border-radius:999px}
.qtext{margin:6px 0 14px;font-size:1.02rem}
.note{margin:0 0 14px;font-size:.84rem;color:#8a6d1a;background:#fff8e6;border:1px solid #f0e2b8;border-radius:8px;padding:8px 12px}
.choices{list-style:none;margin:0 0 16px;padding:0;display:flex;flex-direction:column;gap:8px}
.choice{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:10px 13px;cursor:pointer;transition:.12s}
.choice:hover{border-color:var(--pri);background:var(--pri2)}
.choice .lbl{flex:none;width:24px;height:24px;border-radius:50%;background:#eef1f5;color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
.choice.picked{border-color:var(--sub)}
.card.revealed .choice.correct{border-color:var(--ok);background:#e7f6f2}
.card.revealed .choice.correct .lbl{background:var(--ok);color:#fff}
.card.revealed .choice.picked:not(.correct){border-color:var(--acc);background:#fdeceb}
.card.revealed .choice.picked:not(.correct) .lbl{background:var(--acc);color:#fff}
.reveal{border:1px solid var(--pri);background:#fff;color:var(--pri);padding:8px 18px;border-radius:9px;cursor:pointer;font-size:.92rem;font-weight:600}
.reveal:hover{background:var(--pri);color:#fff}
.answer{display:none;margin-top:14px;padding:14px 16px;background:#f7faf9;border:1px solid #d5e7e2;border-left:4px solid var(--ok);border-radius:8px}
.card.revealed .answer{display:block}
.ans-line{margin:0 0 6px;color:var(--ok)}
.expl{margin:0;font-size:.94rem;color:#33404f}
footer{text-align:center;color:var(--sub);font-size:.82rem;margin-top:30px}
@media(max-width:520px){.wrap{padding:16px 12px 60px}.card{padding:16px}}

.crumbs{font-size:.85rem;color:var(--sub);margin:2px 0 16px}
.crumbs a{color:var(--pri);text-decoration:none}.crumbs a:hover{text-decoration:underline}
.ctx{font-size:.82rem;color:var(--sub);background:var(--pri2);border-radius:8px;padding:6px 12px;margin:0 0 14px;display:inline-block}
.pager{display:flex;justify-content:space-between;gap:10px;margin-top:22px}
.pager a{flex:1;text-align:center;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff;color:var(--pri);text-decoration:none;font-weight:600}
.pager a:hover{background:var(--pri2);border-color:var(--pri)}
.pager .disabled{visibility:hidden}
.qlist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.qlist a{display:flex;gap:10px;border:1px solid var(--line);border-radius:10px;padding:11px 13px;text-decoration:none;color:var(--ink);background:#fff}
.qlist a:hover{border-color:var(--pri);background:var(--pri2)}
.qlist .qn{flex:none;background:var(--pri);color:#fff;font-weight:700;border-radius:7px;padding:1px 9px;font-size:.85rem;height:fit-content}
.setgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:6px 0 22px}
.setgrid a{border:1px solid var(--line);border-radius:10px;padding:12px;text-decoration:none;color:var(--ink);background:#fff}
.setgrid a:hover{border-color:var(--pri);background:var(--pri2)}
.setgrid b{color:var(--pri)}.setgrid small{color:var(--sub)}
.seccat{font-size:1.05rem;color:var(--pri);border-left:4px solid var(--pri);padding:4px 12px;margin:24px 0 10px;background:var(--pri2);border-radius:0 8px 8px 0}
</style></head><body><div class="wrap"><nav class="crumbs"><a href="../">相談用トップ</a> ／ <a href="./">コース2 / セット1 一覧</a> ／ <a href="../../course2-set1/#q7">問題集で開く</a> ／ 問7</nav><div class="ctx">OutSystems O11 問題集 ｜ コース2 / セット1 ｜ 問7</div><article class="card" id="q7">
  <header class="qhead"><span class="qnum">問7</span></header>
  <p class="qtext">アーカイブカタログにインデックスが重要なのはなぜですか？</p>
  
  <ul class="choices"><li class="choice correct"><span class="lbl">A</span><span class="ctxt">より高速な検索性能を可能にするため</span></li><li class="choice"><span class="lbl">B</span><span class="ctxt">自動的な削除を可能にするため</span></li><li class="choice"><span class="lbl">C</span><span class="ctxt">レコードをユーザー入力なしで削除するため</span></li><li class="choice"><span class="lbl">D</span><span class="ctxt">システムリソースの使用量を減らすため</span></li></ul>
  <button class="reveal" onclick="toggle(this)">解答を表示</button>
  <div class="answer"><p class="ans-line"><b>正解：A</b></p><p class="expl">アーカイブカタログでもデータ検索は発生します。インデックスを付与することで、大量のアーカイブデータに対しても高速な検索性能を維持できます。<br></p></div>
</article><div class="pager"><a href="q6.html">← 前の問題</a><a href="q8.html">次の問題 →</a></div></div><script>
function toggle(btn){const c=btn.closest('.card');const on=c.classList.toggle('revealed');btn.textContent=on?'解答を隠す':'解答を表示';}
document.querySelectorAll('.choice').forEach(ch=>{ch.addEventListener('click',()=>{const card=ch.closest('.card');if(!card.classList.contains('revealed')){const b=card.querySelector('.reveal');if(b)b.click();}ch.classList.toggle('picked');});});
</script></body></html>
